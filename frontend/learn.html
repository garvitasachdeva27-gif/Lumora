<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn — Lumora</title>
  <link rel="icon" type="image/jpeg" href="logo.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bgPrimary: '#09090B', bgSurface: '#16161A', bgElevated: '#212127',
            accentPrimary: '#6366F1', accentSecondary: '#8B5CF6', accentGold: '#D4A857', error: '#EF4444',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/theme.js"></script>
</head>
<body class="bg-bgPrimary min-h-screen">
  <div class="flex h-screen">
    <aside id="sidebar-root" class="w-64 shrink-0"></aside>

    <aside class="w-56 shrink-0 card-glass border-r border-white/[0.08] p-3 flex flex-col">
      <button id="newChatBtn"
        class="btn-shimmer gradient-accent text-white text-sm font-medium rounded-lg py-2 mb-3 hover:opacity-90 transition">
        + New Chat
      </button>
      <div id="chatHistoryList" class="flex-1 overflow-y-auto space-y-1"></div>
    </aside>

    <main class="flex-1 flex flex-col relative">
      <div class="ambient-glow w-72 h-72 bg-accentPrimary top-0 right-0"></div>

      <div class="border-b border-white/[0.08] px-6 py-4 flex items-center justify-between relative z-10">
        <h2 id="currentChatTitle" class="font-display text-white font-medium">New Chat</h2>
      </div>

      <div id="messagesContainer" class="flex-1 overflow-y-auto px-6 py-6 max-w-4xl w-full mx-auto relative z-10"></div>

      <div class="border-t border-white/[0.08] p-4 relative z-10">
        <form id="chatForm" class="max-w-4xl mx-auto flex gap-3">
          <input id="chatInput" type="text" placeholder="Ask Lumora anything..." autocomplete="off"
            class="input-field flex-1 bg-bgElevated border border-white/[0.08] rounded-lg px-4 py-3 text-white text-sm" />
          <button id="sendBtn" type="submit"
            class="btn-shimmer gradient-accent text-white text-sm font-medium px-6 rounded-lg hover:opacity-90 transition">
            Send
          </button>
        </form>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
