<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress — Lumora</title>
  <link rel="icon" type="image/jpeg" href="logo.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bgPrimary: '#09090B', bgSurface: '#16161A', bgElevated: '#212127',
            accentPrimary: '#6366F1', accentSecondary: '#8B5CF6', accentGold: '#D4A857', error: '#EF4444',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/theme.js"></script>
</head>
<body class="bg-bgPrimary min-h-screen">
  <div class="flex h-screen">
    <aside id="sidebar-root" class="w-64 shrink-0"></aside>

    <main class="flex-1 overflow-y-auto p-8 relative">
      <div class="ambient-glow w-80 h-80 bg-accentSecondary -top-20 left-1/2"></div>

      <div class="max-w-5xl mx-auto space-y-6 relative z-10" data-stagger="1">
        <h1 class="font-display text-2xl font-semibold text-white reveal">Your Progress</h1>

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
          <div class="reveal card-glass card-lift rounded-2xl p-5 text-center">
            <p id="statStreak" class="text-3xl font-bold font-display gold-glow pulse-number">0</p>
            <p class="text-xs text-zinc-500 mt-1">Day Streak</p>
          </div>
          <div class="reveal card-glass card-lift rounded-2xl p-5 text-center">
            <p id="statSessions" class="text-3xl font-bold font-display text-white">0</p>
            <p class="text-xs text-zinc-500 mt-1">Study Sessions</p>
          </div>
          <div class="reveal card-glass card-lift rounded-2xl p-5 text-center">
            <p id="statTopics" class="text-3xl font-bold font-display text-white">0</p>
            <p class="text-xs text-zinc-500 mt-1">Topics Completed</p>
          </div>
          <div class="reveal card-glass card-lift rounded-2xl p-5 text-center">
            <p id="statQuizScore" class="text-3xl font-bold font-display text-white">0%</p>
            <p class="text-xs text-zinc-500 mt-1">Quiz Accuracy</p>
          </div>
        </div>

        <div class="reveal card-glass rounded-2xl p-6">
          <p class="text-xs text-zinc-500 uppercase tracking-wide mb-4">Weekly Activity</p>
          <div id="weeklyChart" class="flex gap-3"></div>
        </div>

        <div class="reveal card-glass rounded-2xl p-6">
          <p class="text-xs text-zinc-500 uppercase tracking-wide mb-3">Learning Timeline</p>
          <div id="timelineList"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/progress.js"></script>
</body>
</html>
